  <script>

    var ids = ["img0", "img1", "img2", "img3", "img4", "img5", "img6", "img7", "img8", "img9", "img10", "img11", "img12",
      "img13", "img14", "img15", "img16", "img17", "img18", "img19", "img20", "img21", "img22", "img23", "img24",
      "img25", "img26", "img27", "img28", "img29", "img30", "img31", "img32", "img33", "img34"];

    var score = 0;
    var locationsVisited = 0;
    var lastLocation = 0;
    var statueLocation = 19;
    var toucanLocation = 14;
    var lorikeetLocations = [3, 25];
    var buntingLocations = [2, 5, 11, 20, 21];
    var gameOver = false;

    function check(position) {
      // Your check function implementation
      if (gameOver) {
        return;
      }
      var imgId = ids[position];
      var imgEl = document.getElementById(imgId);

      if (position === statueLocation) {
        imgEl.src = "statue.jpg";
        imgEl.onclick = null;
        score -= 3;
        gameOver = true;

      } else if (position === toucanLocation) {
        imgEl.src = "toucan.jpg";
        imgEl.onclick = null;
        score += 5;

      } else if (lorikeetLocations.includes(position)) {
        imgEl.src = "lorikeet.jpg";
        imgEl.onclick = null;
        score += 3;

      } else if (buntingLocations.includes(position)) {
        imgEl.src = "bunting.jpg";
        imgEl.onclick = null;
        score += 1;
      }

      locationsVisited += 1;
      lastLocation = position;

      document.getElementById("locations").innerHTML = "Locations checked: " + locationsVisited;
      document.getElementById("score").innerHTML = "Score: " + score;

    }

    function help() {
      var result = "silence";

      var buntingNeighbors = [
        (lastLocation - 1 + 35) % 35,
        (lastLocation + 1) % 35,
        (lastLocation - 7 + 35) % 35,
        (lastLocation + 7) % 35
      ];
      for (var i = 0; i < buntingNeighbors.length; i++) {
        if (buntingLocations.includes(buntingNeighbors[i])) {
          result = "cheep";
          break;
        }
      }

      if (result === "silence") {
        var lastRow = Math.floor(lastLocation / 7);
        var lastCol = lastLocation % 7;
        outerLoop:
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            var r = lastRow + dr;
            var c = lastCol + dc;
            if (r >= 0 && r < 5 && c >= 0 && c < 7) {
              if ((r * 7 + c) === toucanLocation) {
                result = "caw";
                break outerLoop;
              }
            }
          }
        }
      }

      if (result === "silence") {
        var lastRow = Math.floor(lastLocation / 7);
        var lastCol = lastLocation % 7;
        outerLoop2:
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            var r = lastRow + dr;
            var c = lastCol + dc;
            if (r >= 0 && r < 5 && c >= 0 && c < 7) {
              if ((r * 7 + c) === statueLocation) {
                result = "thrrum";
                break outerLoop2;
              }
            }
          }
        }
      }

      document.getElementById("help").innerHTML = "Help: " + result;
    }
